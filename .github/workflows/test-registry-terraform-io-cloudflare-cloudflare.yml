"jobs":
  "test":
    "name": "Test"
    "runs-on": "ubuntu-latest"
    "steps":
    - "uses": "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
    - "uses": "hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e"
    - "uses": "extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3"
    - "uses": "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c"
      "with":
        "cache": true
        "go-version-file": "go.mod"
    - "uses": "jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8"
      "with":
        "repo": "marcbran/jpoet"
    - "name": "Run tests"
      "run": "just gen-provider ./providers/registry.terraform.io/cloudflare/cloudflare"
    "timeout-minutes": 5
"name": "Test registry.terraform.io/cloudflare/cloudflare"
"on":
  "pull_request":
    "paths":
    - "internal"
    - "providers/registry.terraform.io/cloudflare/cloudflare/**"
  "workflow_dispatch": {}
"permissions":
  "contents": "read"